# SysGuard Configuration Example
#
# Copy this file to configs/config.yaml before running:
#   cp configs/config.example.yaml configs/config.yaml

# 监控配置
monitor:
  check_interval: 30s
  health_threshold: 80.0
  cpu_threshold: 85.0
  memory_threshold: 90.0
  disk_threshold: 90.0

# Agent 编排配置
orchestration:
  interval: 30s
  anomaly_cooldown: 30s

# Agent 工具执行配置
execution:
  command_timeout: 2m
  dry_run: true
  verify_after_remediation: true

# 工具安全配置
security:
  dangerous_commands:
    - rm
    - kill
    - killall
    - dd
    - mkfs
    - shutdown
    - reboot

  enable_approval: true
  approval_timeout: 5m

# 知识库配置
knowledge_base:
  docs_path: "./docs/sop"

# 受管服务
services:
  # 例如:
  # names:
  #   - nginx
  #   - redis

# 可观测性配置
observability:
  enable_tracing: true
  trace_log_path: "./logs/trace.log"

# UI 配置
ui:
  addr: "127.0.0.1:8080"
  # 生产环境建议通过环境变量注入
  auth_token: ""

# AI Agent 配置
# 推荐通过 api_key_env 指向的环境变量注入 API Key。
ai:
  provider: openai
  model: gpt-4.1-mini
  api_key: ""
  api_key_env: OPENAI_API_KEY
  base_url: "https://api.openai.com/v1"
  timeout: 30s
  max_tokens: 2048
  temperature: 0.2

# 存储配置
storage:
  history_path: "./data/history.json"
  runs_path: "./data/runs.json"
  approvals_path: "./data/approvals.json"

# 日志配置
logging:
  level: info
  format: json
  output: ./logs/sysguard.log
